  const val = ref("");
  function getData(timer) {
    return new Promise((resolve, reject) => {
      setTimeout(
        () => {
          resolve(timer);
        }, timer);
    });
  }

  var timer = 3000;
  watch(
    val,
    async (newValue, oldValue, onCleanup) => {
      let flag = true;
      timer -= 1000;
      onCleanup(() => {
        flag = false;
      });
      let r = await getData(timer);
      if(flag) {
        app.innerHTML = r;
      }
    }
  )

  setTimeout(() => {
    val.value = "a";
    val.value = "b";
  }, 1000);
